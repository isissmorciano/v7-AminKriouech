{% extends 'base.html' %}

{% block title %}Crea Piatto{% endblock %}

{% block content %}
<div class="card">
    <h2>Crea Nuovo Piatto</h2>
    <form method="post">
        <label for="categoria_id">Categoria</label>
        <select id="categoria_id" name="categoria_id">
            <option value="">-- Seleziona --</option>
            {% for c in categorie %}
            <option value="{{ c['id'] }}" {% if c['id']|string == categoria_id|default('') %}selected{% endif %}>{{ c['nome'] }}</option>
            {% endfor %}
        </select>

        <label for="nome">Nome Piatto</label>
        <input type="text" id="nome" name="nome" value="{{ nome|default('') }}">

        <label for="prezzo">Prezzo</label>
        <input type="text" id="prezzo" name="prezzo" value="{{ prezzo|default('') }}">

        <button type="submit">Crea Piatto</button>
    </form>
    <p class="back-link"><a href="{{ url_for('main.index') }}">◀ Torna alla home</a></p>
</div>
{% endblock %}
